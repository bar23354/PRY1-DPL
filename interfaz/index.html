<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto 01 | Interfaz Unificada</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            background: "#121416",
            surface: "#1a1c1e",
            panel: "#282a2c",
            primary: "#bcc2ff",
            accent: "#ffb59d"
          },
          fontFamily: {
            headline: ["Space Grotesk", "sans-serif"],
            body: ["Inter", "sans-serif"]
          }
        }
      }
    };
  </script>
  <style>
    body { background: radial-gradient(1200px 800px at 15% -10%, #1d2e93 0%, #121416 55%); }
    .card-active { box-shadow: 0 0 0 1px rgba(188, 194, 255, 0.45), 0 12px 28px rgba(0, 0, 0, 0.35); }
    .glass { background: rgba(40, 42, 44, 0.7); backdrop-filter: blur(14px); }
  </style>
</head>
<body class="text-slate-100 font-body min-h-screen">
  <div class="mx-auto max-w-[1500px] p-4 md:p-6">
    <header class="glass rounded-xl p-4 md:p-5 mb-4 md:mb-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <p class="text-xs tracking-[0.2em] uppercase text-slate-400">UVG | Diseno de Lenguajes</p>
          <h1 class="font-headline text-2xl md:text-3xl font-bold">Proyecto 01 - Interfaz Integrada</h1>
          <p class="text-sm text-slate-300">Un solo punto de acceso para Dashboard, Analisis, Generador Lexico y Test Cases.</p>
        </div>
        <div class="text-xs text-slate-300">
          <p>Complejidades disponibles: Baja, Media, Alta</p>
          <p>Cumple con enfoque de evidencia para rubrica</p>
        </div>
      </div>
    </header>

    <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3 md:gap-4 mb-4 md:mb-6" id="moduleGrid">
      <button data-view="dashboard" class="module-btn card-active text-left bg-surface rounded-xl p-4 transition hover:-translate-y-0.5">
        <p class="text-xs uppercase tracking-[0.18em] text-primary">Vista 01</p>
        <h2 class="font-headline text-lg font-semibold mt-1">Dashboard General</h2>
        <p class="text-sm text-slate-400 mt-1">Estado global del proyecto, rubrica y modulos.</p>
      </button>
      <button data-view="analysis" class="module-btn text-left bg-surface rounded-xl p-4 transition hover:-translate-y-0.5">
        <p class="text-xs uppercase tracking-[0.18em] text-primary">Vista 02</p>
        <h2 class="font-headline text-lg font-semibold mt-1">Lexical Analysis</h2>
        <p class="text-sm text-slate-400 mt-1">Identificacion de tokens y deteccion de errores.</p>
      </button>
      <button data-view="generator" class="module-btn text-left bg-surface rounded-xl p-4 transition hover:-translate-y-0.5">
        <p class="text-xs uppercase tracking-[0.18em] text-primary">Vista 03</p>
        <h2 class="font-headline text-lg font-semibold mt-1">Lexical Generator</h2>
        <p class="text-sm text-slate-400 mt-1">Editor YALex y diagrama de transiciones.</p>
      </button>
      <button data-view="tests" class="module-btn text-left bg-surface rounded-xl p-4 transition hover:-translate-y-0.5">
        <p class="text-xs uppercase tracking-[0.18em] text-primary">Vista 04</p>
        <h2 class="font-headline text-lg font-semibold mt-1">Test Case Manager</h2>
        <p class="text-sm text-slate-400 mt-1">Casos baja/media/alta y ejecucion de pruebas.</p>
      </button>
    </section>

    <section class="bg-panel/85 rounded-xl overflow-hidden border border-slate-700/30">
      <div class="flex items-center justify-between p-3 md:p-4 bg-slate-900/60">
        <div>
          <p class="text-xs uppercase tracking-[0.16em] text-slate-400">Modulo activo</p>
          <h3 id="activeTitle" class="font-headline text-lg">Dashboard General</h3>
        </div>
        <a id="openStandalone" class="text-xs md:text-sm px-3 py-2 rounded-md bg-gradient-to-br from-primary to-[#8390f2] text-[#152383] font-semibold" href="dashboard_project_01/code.html" target="_blank" rel="noopener noreferrer">
          Abrir vista independiente
        </a>
      </div>
      <iframe id="moduleFrame" title="Interfaz de modulo" src="dashboard_project_01/code.html" class="w-full h-[75vh] md:h-[78vh] bg-black"></iframe>
    </section>
  </div>

  <script>
    const views = {
      dashboard: {
        title: "Dashboard General",
        src: "dashboard_project_01/code.html"
      },
      analysis: {
        title: "Lexical Analysis",
        src: "analysis_tool/code.html"
      },
      generator: {
        title: "Lexical Generator",
        src: "lexical_generator/code.html"
      },
      tests: {
        title: "Test Case Manager",
        src: "test_case_manager/code.html"
      }
    };

    const frame = document.getElementById("moduleFrame");
    const title = document.getElementById("activeTitle");
    const standalone = document.getElementById("openStandalone");
    const buttons = document.querySelectorAll(".module-btn");

    buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const key = btn.getAttribute("data-view");
        const view = views[key];
        if (!view) return;

        frame.src = view.src;
        title.textContent = view.title;
        standalone.href = view.src;

        buttons.forEach((b) => b.classList.remove("card-active"));
        btn.classList.add("card-active");
      });
    });
  </script>
</body>
</html>
